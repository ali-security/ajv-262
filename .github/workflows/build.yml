name: build
on:
  push:
    branches: [master]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-22.04 # Pinned to 22.04 instead of latest for better Node 16 compatibility
    strategy:
      fail-fast: false # Optional: Prevents the whole CI run from cancelling if Node 16 fails
      matrix:
        node-version: [16.x, 18.x, 20.x, 21.x]

    steps:
      - uses: actions/checkout@v4
      - name: use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: git submodule update --init
      - run: npm run build
      - run: npm run test-ci
      